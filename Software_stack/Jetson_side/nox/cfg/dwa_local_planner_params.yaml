DWAPlannerROS:
  odom_topic: odom

  max_vel_x: 0.3
  min_vel_x: 0.0              # was -0.1 (invalid)

  max_vel_y: 0.0
  min_vel_y: 0.0

  # max_trans_vel: 0.3
  # min_trans_vel: 0.0          # allow slow movement

  # max_rot_vel: 0.6
  # min_rot_vel: 0.05           # was too high (0.2)

  acc_lim_x: 1.0
  acc_lim_y: 0.0
  acc_lim_theta: 3.2

  xy_goal_tolerance: 0.1
  yaw_goal_tolerance: 0.17
  latch_xy_goal_tolerance: false

  sim_time: 2.0               # reduce from 3.0 for more responsive sampling
  sim_granularity: 0.025
  vx_samples: 20
  vy_samples: 0
  vtheta_samples: 40
  controller_frequency: 10.0

  path_distance_bias: 32.0    # was 80 (too aggressive)
  goal_distance_bias: 20.0    # was 30
  occdist_scale: 0.01
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  oscillation_reset_dist: 0.05

  publish_traj_pc: true
  publish_cost_grid_pc: true
